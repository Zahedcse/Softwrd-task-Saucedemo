name: Playwright E2E Tests

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      test_suite:
        description: 'Test suite tag to run (leave empty for all)'
        required: false
        default: ''
        type: string

# Cancel in-progress runs on new push to same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Application — public SauceDemo test credentials, safe to expose
  BASE_URL: https://www.saucedemo.com
  STANDARD_USER: standard_user
  LOCKED_OUT_USER: locked_out_user
  PROBLEM_USER: problem_user
  PERFORMANCE_GLITCH_USER: performance_glitch_user
  ERROR_USER: error_user
  VISUAL_USER: visual_user
  VALID_PASSWORD: secret_sauce

  # Timeouts — more generous on CI to absorb runner variability
  ACTION_TIMEOUT: 15000
  TEST_TIMEOUT: 90000
  NAVIGATION_TIMEOUT: 45000
  GLITCH_USER_TIMEOUT: 25000

  NODE_ENV: ci
  CI: true
  HEADLESS: true

jobs:
  # ── 1. Type-check before running any tests ─────────────────────
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

  # ── 2. Run tests in a browser matrix ──────────────────────────
  test:
    name: Tests — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        run: |
          GREP_FLAG=""
          if [ -n "${{ github.event.inputs.test_suite }}" ]; then
            GREP_FLAG="--grep @${{ github.event.inputs.test_suite }}"
          fi
          npx playwright test --project=${{ matrix.browser }} $GREP_FLAG
        continue-on-error: true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report-${{ matrix.browser }}
          path: reports/html/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 30

      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-${{ matrix.browser }}
          path: reports/junit/
          retention-days: 30

      - name: Upload failure artifacts (screenshots / videos / traces)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  # ── 3. Merge Allure results and publish report ──────────────────
  allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results --clean -o reports/allure

      - name: Upload merged Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-merged
          path: reports/allure/
          retention-days: 30

      # Deploy to GitHub Pages on main only
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/allure
          destination_dir: allure-report

  # ── 4. Post test summary as PR comment ─────────────────────────
  pr-comment:
    name: Post PR Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
      checks: write

    steps:
      - name: Download JUnit results
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          merge-multiple: true
          path: junit-results/

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit-results/**/*.xml
          comment_title: 'Playwright E2E Test Results'
          check_name: 'E2E Tests'
